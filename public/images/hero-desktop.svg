<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B1628"/>
      <stop offset="100%" stop-color="#020617"/>
    </radialGradient>

    <radialGradient id="glow1" cx="20%" cy="0%" r="65%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1E40AF" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#1E3A8A" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#1E3A8A" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glow2" cx="85%" cy="20%" r="50%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1D4ED8" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#1D4ED8" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glow3" cx="50%" cy="100%" r="55%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0C1A3A" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0C1A3A" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1E40AF" stop-opacity="0"/>
      <stop offset="30%" stop-color="#3B82F6" stop-opacity="0.4"/>
      <stop offset="70%" stop-color="#3B82F6" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#1E40AF" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="lineGradV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E40AF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#2563EB" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#1E40AF" stop-opacity="0"/>
    </linearGradient>

    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M 56 0 L 0 0 0 56" fill="none" stroke="#1E293B" stroke-width="0.5" stroke-opacity="0.45"/>
    </pattern>

    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1" fill="#334155" fill-opacity="0.6"/>
    </pattern>

    <clipPath id="heroClip">
      <rect width="1440" height="900"/>
    </clipPath>
  </defs>

  <rect width="1440" height="900" fill="url(#bg)"/>
  <rect width="1440" height="900" fill="url(#grid)"/>
  <rect width="1440" height="900" fill="url(#dots)"/>
  <rect width="1440" height="900" fill="url(#glow1)"/>
  <rect width="1440" height="900" fill="url(#glow2)"/>
  <rect width="1440" height="900" fill="url(#glow3)"/>

  <!-- Horizontal accent lines -->
  <line x1="0" y1="120" x2="900" y2="120" stroke="url(#lineGrad)" stroke-width="1"/>
  <line x1="200" y1="300" x2="1440" y2="300" stroke="url(#lineGrad)" stroke-width="0.5"/>
  <line x1="0" y1="500" x2="700" y2="500" stroke="url(#lineGrad)" stroke-width="0.5"/>
  <line x1="500" y1="720" x2="1440" y2="720" stroke="url(#lineGrad)" stroke-width="0.5"/>

  <!-- Vertical accent lines -->
  <line x1="200" y1="0" x2="200" y2="500" stroke="url(#lineGradV)" stroke-width="0.5"/>
  <line x1="560" y1="0" x2="560" y2="900" stroke="url(#lineGradV)" stroke-width="0.5"/>
  <line x1="1100" y1="200" x2="1100" y2="900" stroke="url(#lineGradV)" stroke-width="0.5"/>
  <line x1="1300" y1="0" x2="1300" y2="600" stroke="url(#lineGradV)" stroke-width="0.5"/>

  <!-- Subtle node dots -->
  <circle cx="200" cy="120" r="3" fill="#3B82F6" fill-opacity="0.6"/>
  <circle cx="560" cy="300" r="3" fill="#3B82F6" fill-opacity="0.5"/>
  <circle cx="1100" cy="500" r="3" fill="#3B82F6" fill-opacity="0.6"/>
  <circle cx="1300" cy="720" r="3" fill="#3B82F6" fill-opacity="0.5"/>
  <circle cx="560" cy="720" r="2" fill="#60A5FA" fill-opacity="0.4"/>
  <circle cx="200" cy="500" r="2" fill="#60A5FA" fill-opacity="0.3"/>
  <circle cx="900" cy="120" r="2" fill="#93C5FD" fill-opacity="0.4"/>
  <circle cx="700" cy="300" r="2" fill="#93C5FD" fill-opacity="0.3"/>

  <!-- Corner decoration -->
  <rect x="0" y="0" width="4" height="4" fill="#2563EB" fill-opacity="0.7"/>
  <rect x="0" y="0" width="1" height="40" fill="#2563EB" fill-opacity="0.3"/>
  <rect x="0" y="0" width="40" height="1" fill="#2563EB" fill-opacity="0.3"/>
  <rect x="1436" y="0" width="4" height="4" fill="#2563EB" fill-opacity="0.7"/>
  <rect x="1436" y="0" width="1" height="40" fill="#2563EB" fill-opacity="0.3"/>
  <rect x="1400" y="0" width="40" height="1" fill="#2563EB" fill-opacity="0.3"/>
  <rect x="0" y="896" width="4" height="4" fill="#2563EB" fill-opacity="0.7"/>
  <rect x="0" y="860" width="1" height="40" fill="#2563EB" fill-opacity="0.3"/>
  <rect x="0" y="899" width="40" height="1" fill="#2563EB" fill-opacity="0.3"/>
  <rect x="1436" y="896" width="4" height="4" fill="#2563EB" fill-opacity="0.7"/>
  <rect x="1436" y="860" width="1" height="40" fill="#2563EB" fill-opacity="0.3"/>
  <rect x="1400" y="899" width="40" height="1" fill="#2563EB" fill-opacity="0.3"/>
</svg>
